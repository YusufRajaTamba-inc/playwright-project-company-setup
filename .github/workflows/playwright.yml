name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        default: "SIT"
        type: choice
        options:
          - SIT
          - UAT

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint all packages
        run: |
          npm run lint:web
          npm run lint:api
          npm run lint:common-module
          npm run lint:mobile

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || vars.ENV || 'SIT' }}
    env:
      ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || vars.ENV || 'SIT' }}
      BASE_URL: ${{ secrets.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (web)
        run: npx playwright install --with-deps chromium
        working-directory: packages/web-automation

      - name: Run web tests
        run: npm run test:web

      - name: Upload web report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: web-playwright-report
          path: packages/web-automation/playwright-report/
          retention-days: 14

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || vars.ENV || 'SIT' }}
    env:
      ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || vars.ENV || 'SIT' }}
      BASE_URL: ${{ secrets.BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (api)
        run: npx playwright install --with-deps chromium
        working-directory: packages/api-automation

      - name: Run API tests
        run: npm run test:api

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: api-playwright-report
          path: packages/api-automation/playwright-report/
          retention-days: 14
